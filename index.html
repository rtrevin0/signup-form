<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Sign Up</title>
</head>
<body>
    <div class="container">
        <img src="kevin-mueller-PvpeQjWk33Y-unsplash.jpg" 
             alt="Snow-capped mountain peak at sunrise with rocky foreground" 
             class="image"
        >
        <div class="content">
            <div class="signup-info">
                <p>This is not a real online service! You know you need something like this in your life to help you realize your deepest dreams. Sign up now to get started.</p>
                <p>You <i>know</i> you want to.</p>
            </div>
            <form class="signup-form">
                <div class="signup-form-row">
                    <div class="signup-form-input-group">
                        <label for="firstName">First Name</label>
                        <input type="text" name="firstName" required>
                    </div>
                    <div class="signup-form-input-group">
                        <label for="lastName">Last Name</label>
                        <input type="text" name="lastName" required>
                    </div>
                </div>
                <div class="signup-form-row">
                    <div class="signup-form-input-group">
                        <label for="email">Email</label>
                        <input type="email" placeholder="Email" name="email" required>
                    </div>   
                    <div class="signup-form-input-group">
                        <label for="phoneNumber">Phone Number</label>
                        <input type="text" name="phoneNumber" required>
                    </div>
                </div>
                <div class="signup-form-row">
                    <div class="signup-form-input-group">
                        <label for="password">Password</label>
                        <input type="password" placeholder="Password" name="password" required>
                    </div>
                    <div class="signup-form-input-group">
                        <label for="confirmPassword">Confirm Password</label>
                        <input type="password" placeholder="Confirm Password" name="confirmPassword" required>
                    </div>
                </div>           
                <button type="submit">Create Account</button>
            </form>
            <span class="login-link">Already have an account? <a href="#">Log in</a></span>
        </div>
    </div>
</body>
</html>
